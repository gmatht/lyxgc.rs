# Build and publish chktex binaries on version tag push.
# Trigger: git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: chktex-linux-x86_64
            suffix: .tar.gz
          - os: windows-latest
            artifact: chktex-windows-x86_64
            suffix: .zip
          - os: macos-latest
            artifact: chktex-macos-aarch64
            suffix: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          BIN=target/release/chktex
          cp "$BIN" "${{ matrix.artifact }}"
          GZIP=-9 tar czf "${{ matrix.artifact }}${{ matrix.suffix }}" "${{ matrix.artifact }}"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $bin = "target/release/chktex.exe"
          Compress-Archive -Path $bin -DestinationPath "${{ matrix.artifact }}${{ matrix.suffix }}" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}${{ matrix.suffix }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: chktex-*
          path: dist
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" dist/* --clobber
